name: Build standalone engine (variant C)

# Freezes the Mobiscout engine into a self-contained per-platform binary (no user
# Python) with PyInstaller. Kept off the per-PR path (building 4 platforms is
# heavy) — run it on demand, on version tags, or when a release is published; the
# binaries are uploaded as artifacts and, for a release, attached to it.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
  release:
    types: [published]

permissions:
  contents: write  # attach binaries to the release

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            artifact: mobiscout-engine-macos-arm64
            binary: dist/mobiscout-engine
          - os: macos-13        # Intel
            artifact: mobiscout-engine-macos-x64
            binary: dist/mobiscout-engine
          - os: ubuntu-latest
            artifact: mobiscout-engine-linux-x64
            binary: dist/mobiscout-engine
          - os: windows-latest
            artifact: mobiscout-engine-windows-x64.exe
            binary: dist/mobiscout-engine.exe
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install engine + build tooling
        # Full requirements so PyInstaller can import every framework submodule
        # (the classifier imports sklearn at module top, etc.), plus the package
        # itself and PyInstaller.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Freeze
        run: pyinstaller packaging/mobiscout-engine.spec --noconfirm --clean

      - name: Smoke test (runs with no interpreter dependency)
        shell: bash
        run: |
          out=$(echo '{"jsonrpc":"2.0","id":1,"method":"health/check","params":{}}' | "${{ matrix.binary }}")
          echo "$out"
          echo "$out" | grep -q '"status": "ok"' || { echo "engine did not respond ok"; exit 1; }

      - name: Rename + checksum
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary }}" "out/${{ matrix.artifact }}"
          cd out
          # sha256sum on Linux/Windows(git-bash), shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
          cat "${{ matrix.artifact }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/${{ matrix.artifact }}
            out/${{ matrix.artifact }}.sha256
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            out/${{ matrix.artifact }}
            out/${{ matrix.artifact }}.sha256

name: Build standalone engine (variant C)

# Freezes the Observe engine into a self-contained per-platform binary (no user
# Python) with PyInstaller. Kept off the per-PR path (building 4 platforms is
# heavy) — run it on demand, on version tags, or when a release is published; the
# binaries are uploaded as artifacts and, for a release, attached to it.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
  release:
    types: [published]

permissions:
  contents: write  # attach binaries to the release

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            artifact: observe-engine-macos-arm64
            binary: dist/observe-engine
          - os: macos-13        # Intel
            artifact: observe-engine-macos-x64
            binary: dist/observe-engine
          - os: ubuntu-latest
            artifact: observe-engine-linux-x64
            binary: dist/observe-engine
          - os: windows-latest
            artifact: observe-engine-windows-x64.exe
            binary: dist/observe-engine.exe
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install engine + build tooling
        # Full requirements so PyInstaller can import every framework submodule
        # (the classifier imports sklearn at module top, etc.), plus the package
        # itself and PyInstaller.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Freeze
        run: pyinstaller packaging/observe-engine.spec --noconfirm --clean

      - name: Smoke test (runs with no interpreter dependency)
        shell: bash
        run: |
          out=$(echo '{"jsonrpc":"2.0","id":1,"method":"health/check","params":{}}' | "${{ matrix.binary }}")
          echo "$out"
          echo "$out" | grep -q '"status": "ok"' || { echo "engine did not respond ok"; exit 1; }

      - name: Rename to platform artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary }}" "out/${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.artifact }}

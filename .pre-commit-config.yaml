# Pre-commit hooks for Mobiscout
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.13
        args: ['--line-length=120']

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,E501']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-error-summary']
        additional_dependencies: ['types-PyYAML', 'types-requests']

  - repo: local
    hooks:
      - id: security-scan
        name: Security Scanner
        entry: python -m framework.security.config
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      - id: no-hardcoded-secrets
        name: Check for hardcoded secrets
        entry: bash -c 'if grep -r "password.*=.*['\''\"]\w\{8,\}" framework/ --include="*.py" | grep -v test | grep -v example; then echo "Found hardcoded password"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: test-critical
        name: Run critical tests
        entry: pytest tests/ -v -k "test_critical or test_security" --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]
